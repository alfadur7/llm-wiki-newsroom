# Korean FAQ — single source for the visible /ko/faq page and its FAQPage JSON-LD.
# Keep answers as single-line plain prose (no markdown), native Korean, free of
# translationese (no 부풀다 -> 불어나다/커지다; no 역할을 갈라놓다 -> 따로 두다/나누다;
# no mid-sentence em-dash -> 괄호/쉼표/마침표; unpack "~라는 것/~하는 것").
# Terminology unified with the operator-vetted GeekNews post (news.hada.io id=31140):
# 채점 기준(루브릭) / 규칙대로 도는 파이썬 검사(린트) / 데스크(검수) / 작업 조율(오케스트레이션)
# / 문서 상단 메타데이터(frontmatter) / 바네바 부시 / 각자 자기 키(BYOK).

- q: "LLM Wiki Newsroom이 뭔가요?"
  a: >-
    문서 폴더를 서로 연결된, 사람이 읽을 수 있는 마크다운 위키로 바꿔 주는 오픈소스
    프레임워크입니다. 신문사 편집국을 본떠 다섯 역할로 나눈 AI 편집국이 이 일을 맡습니다.
    기사·메모·PDF를 폴더에 넣고 명령어 하나를 실행하면, 에이전트가 문서를 읽고 인물·개념·관계를
    뽑아 서로 링크된 페이지로 정리합니다. RAG를 대신하는, 지속되고 구조화된 대안이며,
    Claude Code를 주 대상으로 설계했습니다.

- q: "RAG와 어떻게 다른가요?"
  a: >-
    RAG는 질문할 때마다 원문 조각을 다시 긁어모아 답변에 끼워 넣습니다. LLM Wiki Newsroom은
    대신 지식을 미리 구조화해 쌓아 둡니다. 소스를 한 번 위키 페이지로 정리해 두고, 위키링크와
    백링크 색인으로 서로 엮고, 모순은 질문 시점이 아니라 문서를 넣는 순간 표시하고, 새 소스를
    넣을 때마다 기존 페이지를 보강합니다. 그래서 검색할 때는 날것의 조각이 아니라 이미 정리된
    페이지 몇 개만 읽습니다.

- q: "API 키가 필요한가요?"
  a: >-
    'API 키가 필요 없다'는 말은 절반만 맞습니다. 위키를 만드는 파이썬 도구(그래프 생성기·린트·로컬
    검색)는 외부 API 키 없이 내 컴퓨터에서 전부 돕니다. 다만 읽고 쓰는 에이전트 자체는 Claude
    Code로 돌아가니, 그건 각자 자기 키를 물려 써야 합니다(BYOK). 정리하면, 도구는 로컬 우선이고
    어떤 언어 모델을 쓰느냐는 여러분의 Claude Code에 달려 있습니다.

- q: "어떤 AI 에이전트에서 돌아가나요?"
  a: >-
    Claude Code가 주력이자 완전 지원 대상으로, 아홉 개 슬래시 명령어와 연쇄 갱신·연상 탐색
    같은 고급 기능이 다 돌아갑니다. Codex와 Gemini CLI는 AGENTS.md와 GEMINI.md를 통해
    기본 수준으로 지원합니다. 자연어로 지시해 핵심 정리 워크플로는 쓸 수 있지만, Claude Code
    전용 기능은 빠집니다.

- q: "안드레 카파시의 LLM Wiki와 관련이 있나요?"
  a: >-
    네. 안드레 카파시가 공유한 LLM Wiki gist에 구현을 하나 붙여본 게 출발이었습니다. 소스 문서,
    에이전트가 만든 위키, 에이전트의 운영 규칙을 각각 다른 계층으로 두는 3계층 패턴을 따르고,
    문서 하나를 넣으면 관련 페이지 10~15개가 갱신된다는 그의 아이디어를 구현합니다. 대부분의
    구현보다 한발 더 나간 부분은 스스로 진화하는 저작 지침과, 검수를 따로 맡는 다섯 역할 편집국입니다.

- q: "'글 쓴 에이전트가 검수는 안 한다'는 게 무슨 뜻인가요?"
  a: >-
    위키 페이지를 쓰는 에이전트와 검수하는 에이전트를 컨텍스트가 격리된 별도 인스턴스로 둡니다.
    검수하는 쪽은 완성된 초안과 채점 기준(루브릭)만 봅니다. 글쓴이의 사고 과정이나 중간 메모는
    못 봅니다. 한 에이전트가 자기 글을 자기가 채점하면 아무래도 후하게 봐주는데, 그 편향을
    줄이려는 겁니다. 게시는 규칙대로 도는 파이썬 검사(린트)와 사람이 하는 검수, 양쪽을 다 통과해야
    열립니다. 이건 이 프로젝트가 검증 중인 설계 가설이지, 엄밀하게 측정된 결과는 아직 아닙니다.

- q: "'스스로 진화하는 저작 지침'이 뭔가요?"
  a: >-
    같은 검수 지적이 반복되면, 시스템이 자기 저작 규칙을 고치는 안을 스스로 만듭니다. 그리고
    바꾸기 전과 후를 어느 쪽이 바뀐 버전인지 모르게 나란히 비교해서, 실제로 점수가 오를 때만 그
    변경을 남깁니다. 이때 검증에 쓰는 실패 사례는 매번 새것으로 갈아끼워서, 규칙이 같은 시험
    문제에만 익숙해지는 것(overfit)을 막습니다. 늘 처음 보는 사례로 확인하는 셈이죠. 그래서
    시간이 지나면 위키만이 아니라 위키를 만드는 지침도 좋아집니다. 이 루프는 아직 실험 단계고,
    효과도 아직 제대로 측정한 게 아닙니다.

- q: "실무에 바로 쓸 만큼 검증됐나요?"
  a: >-
    공개 레포는 아이디어와 재현 가능한 작은 예제로 봐 주세요. 'AI에서 오픈소스란 무엇인가'
    논쟁을 담은 노드 15개짜리 영어 예제가 들어 있을 뿐, 검증을 마친 제품이 아닙니다. 쓰는 쪽과
    검수하는 쪽의 분리나 자기진화 루프 같은 차별점도 풀린 주장이 아니라, 만든 사람이 측정 중인
    가설로 제시합니다. 새 프로젝트이고, 설계상 한계에 대해 정직하려고 합니다.

- q: "모순 추적이 뭔가요?"
  a: >-
    새로 넣은 문서가 기존 주장과 충돌하면, 그 불일치를 조용히 뭉개지 않고 문서를 넣는 순간
    기록합니다. 모순은 전용 페이지로 따로 빠지는데, 전체 요약에서 주제별 분석으로, 다시 충돌하는
    원본 주장으로 내려가는 순서로 정리됩니다. 그래서 하나로 평균 낸 답 대신, 소스들이 어디서 왜
    엇갈리는지를 볼 수 있습니다.

- q: "한국어로 쓸 수 있나요?"
  a: >-
    WIKI_LANG=ko로 켜는 선택형 한국어 모드가 있습니다. 페이지 본문과 문서 상단
    메타데이터(frontmatter)를 한국어로 바꿔 줍니다. 다만 문서 구조를 나타내는 표기(## Summary,
    [fact] 같은 것)는 도구가 그대로 찾아 써야 해서 일부러 영어로 남깁니다. '완전 한국어'는
    아니라는 뜻이죠. 그러니까 한국어 모드는 문서 구조 표기가 아니라 본문 글을 한국어로 바꿔 줍니다.

- q: "설치 전에 결과를 볼 수 있나요?"
  a: >-
    레포에 담긴 예제는 GitHub Wiki로 공개돼 있어서, clone 없이 생성된 페이지를 읽어 볼 수
    있습니다. 인터랙티브 지식 그래프(페이지는 노드, 링크는 엣지, 비슷한 주제끼리 자동으로 묶음)는
    clone 후 graph 폴더를 띄우고 브라우저에서 graph.html을 열면 로컬에서 돕니다.

- q: "내 데이터가 외부로 나가나요?"
  a: >-
    위키는 내 컴퓨터에서 버전관리되는 순수 마크다운 파일로 저장되고, 빌드·린트·로컬 검색 도구는
    내용을 외부로 보내지 않습니다. 네트워크를 타는 유일한 부분은 에이전트 자체입니다. Claude
    Code로 돌아가니, 에이전트가 읽고 쓰는 텍스트는 다른 Claude Code 사용과 똑같이 여러분의
    Claude Code 세션을 거칩니다.
